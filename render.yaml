services:
  - type: web
    name: roulette-app
    runtime: node
    region: tokyo
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
    routes:
      - type: http
        path: /
